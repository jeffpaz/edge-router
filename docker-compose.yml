# Docker Compose v5 — no 'version:' key required
# Run: ./deploy.sh  (or: docker compose up -d)

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    environment:
      OLLAMA_MODELS: /models
      OLLAMA_NUM_CTX: 512
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_KV_CACHE_TYPE: q4_0
      OLLAMA_KEEP_ALIVE: 1h
    volumes:
      - /mnt/models/ollama:/models
      - /mnt/logs/ollama:/logs
    networks:
      - edge-net

  edge-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edge-router
    ports:
      - "8000:8000"
    restart: unless-stopped

    # Load all keys from .env into the container AND into Compose's own
    # interpolation scope so the environment: block below can reference them.
    env_file:
      - .env

    environment:
      # ── Name translation ─────────────────────────────────────────────────────
      # .env uses GEMINI_API_KEY / GROK_API_KEY (natural provider names).
      # config.py reads GOOGLE_API_KEY / XAI_API_KEY (SDK convention).
      # These mappings bridge the gap; both names end up in the container.
      GOOGLE_API_KEY: ${GEMINI_API_KEY:-}
      XAI_API_KEY: ${GROK_API_KEY:-}

      # ── Ollama endpoint ──────────────────────────────────────────────────────
      # Default: reach Ollama via the host gateway (works immediately).
      # Alternative: set OLLAMA_BASE_URL=http://ollama:11434 in .env after
      # deploy.sh has connected the ollama container to edge-net.
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-4096}

      # Prevent .pyc writes into the read-only layer
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    extra_hosts:
      # On Linux, host.docker.internal is not injected automatically (unlike Mac/Windows).
      # host-gateway resolves to the host's Docker bridge IP (typically 172.17.0.1),
      # letting the container reach Ollama at http://host.docker.internal:11434.
      - "host.docker.internal:host-gateway"

    networks:
      - edge-net

    depends_on:
      - ollama

    # Structured healthcheck against our own /health endpoint
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  # User-defined bridge network with DNS support.
  # After running deploy.sh, the ollama container is also connected here,
  # making http://ollama:11434 available as an alternative endpoint.
  edge-net:
    name: edge-net
    driver: bridge
